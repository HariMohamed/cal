name: CI/CD — Test & Docker Deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ─────────────────────────────────────────
  # JOB 1 : Tests & Lint (Python matrix)
  # ─────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt', '**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov flake8 flask

      - name: Lint code
        run: |
          flake8 . --max-line-length=100 --exclude=.git,__pycache__,.pytest_cache

      - name: Run tests with coverage
        run: |
          pytest -q --disable-warnings --maxfail=1 --cov=. --cov-report=term-missing

  # ─────────────────────────────────────────
  # JOB 2 : Build & Push Docker
  # Ne s'exécute que si les tests passent
  # ET uniquement sur push (pas sur PR)
  # ─────────────────────────────────────────
  docker:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    needs: test                        # bloqué tant que "test" n'est pas vert
    if: github.event_name == 'push'    # pas de push sur Docker depuis une PR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: saidwahidtekno
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t saidwahidtekno/gestionretard:latest .

      - name: Push Docker image
        run: docker push saidwahidtekno/gestionretard:latest